{{range .Sessions}}
<div class="session-item group relative">
  <button class="w-full text-left px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded-lg transition-colors flex flex-col gap-1 pr-10" onclick="loadSession('{{.SessionID}}')">
    <span class="font-medium truncate">{{if .FirstMessage}}{{.FirstMessage}}{{else}}New Chat{{end}}</span>
    <span class="text-xs text-gray-500">{{.MessageCount}} messages &bull; {{.CreatedAt.Format "Jan 02, 15:04"}}</span>
  </button>
  <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1">
    <button 
      class="delete-trigger p-2 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
      onclick="event.stopPropagation(); this.nextElementSibling.classList.remove('hidden'); this.classList.add('hidden')"
      title="Delete Chat"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
    </button>
    <div class="delete-confirm hidden bg-gray-900 border border-red-900/50 p-1.5 rounded-lg flex items-center gap-2 shadow-2xl z-30 animate-in fade-in zoom-in duration-200">
      <span class="text-[10px] font-bold text-red-500 uppercase tracking-tighter">Delete?</span>
      <button 
        hx-post="/ui/delete?session_id={{.SessionID}}" 
        hx-target="closest .session-item" 
        hx-swap="outerHTML swap:0.5s"
        class="text-[10px] bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-2 py-1 rounded transition-colors"
        onclick="event.stopPropagation()"
      >Yes</button>
      <button 
        class="text-[10px] bg-gray-800 hover:bg-gray-700 text-gray-400 px-2 py-1 rounded transition-colors"
        onclick="event.stopPropagation(); this.parentElement.classList.add('hidden'); this.parentElement.previousElementSibling.classList.remove('hidden')"
      >No</button>
    </div>
  </div>
</div>
{{end}}

{{if .HasMore}}
<div hx-get="/ui/history?offset={{.NextOffset}}" hx-trigger="revealed" hx-swap="outerHTML">
  <div class="px-3 py-2 text-xs text-gray-500 text-center">Loading more...</div>
</div>
{{end}}
