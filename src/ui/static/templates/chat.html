{{template "base.html" .}}

{{define "content"}}
<div class="h-full flex flex-col">

  <!-- Header -->
  <header class="flex-shrink-0 border-b border-gray-800 px-6 py-4 flex justify-between items-center relative">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-sm">S</div>
      <h1 class="text-lg font-semibold text-white">SmithAI</h1>
      <span class="text-xs text-gray-500 ml-2">Agent</span>
    </div>

    <!-- Context Menu -->
    <div class="relative">
      <button id="menu-btn" onclick="toggleMenu()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="19" cy="12" r="1"></circle>
          <circle cx="5" cy="12" r="1"></circle>
        </svg>
      </button>

      <div id="menu-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-gray-800 border border-gray-700 rounded-xl shadow-2xl z-50 flex flex-col max-h-[70vh]">
        <div class="p-2 border-b border-gray-700 flex-shrink-0">
          <button class="w-full text-left px-3 py-2 text-sm text-gray-200 hover:bg-gray-700 rounded-lg flex items-center gap-2 transition-colors">
            <span>⚙️</span> Settings
          </button>
        </div>
        <div class="p-2 flex-1 overflow-y-auto min-h-32">
          <div class="px-3 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Past Chats</div>
          <div id="past-chats-list" class="space-y-1" hx-get="/ui/history?offset=0" hx-trigger="load" hx-swap="innerHTML">
            <div class="text-xs text-gray-500 px-3 py-2 text-center">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Chat messages -->
  <div id="chat-messages" class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
    <!-- Messages get appended here by JS -->
    <div class="flex justify-center">
      <p class="text-gray-600 text-sm">Send a message to start chatting.</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="flex-shrink-0 border-t border-gray-800 px-6 py-4">
    <div class="flex gap-3 max-w-4xl mx-auto">
      <textarea
        id="chat-input"
        rows="1"
        placeholder="Type your message..."
        class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-gray-100 text-sm resize-none
               placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500
               transition-colors"
      ></textarea>
      <button
        onclick="submitChat()"
        class="px-5 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-medium
               transition-colors flex items-center gap-2"
      >
        Send
      </button>
    </div>
  </div>

</div>
{{end}}
