name: build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: install dependencies
      run: go mod download

    - name: build
      run: go build -v ./...

    - name: test
      run: go test -v ./...
