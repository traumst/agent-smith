name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "version number (e.g., v1.1.1)"
        required: true
        type: string

# Enforce least-privilege permissions
permissions:
  contents: write

jobs:
  prepare-release:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: get version
        id: get-version
        run: |
          VERSION=${{ github.event.inputs.version }}
          if [ -z "$VERSION" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: agent-smith-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: agent-smith-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: agent-smith-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # Linux requires specific GTK dependencies for GUI compilation
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Replace with 'go install github.com/wailsapp/wails/v2/cmd/wails@latest' if using v2
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails@latest

      # Use wails build instead of go build to ensure assets are bundled
      - name: build
        run: |
          wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -o ${{ matrix.binary_name }}
        env:
          CGO_ENABLED: 1

      # v4 requires unique artifact names per concurrent job
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/${{ matrix.binary_name }} # Adjust path to wherever your build tool outputs

  release:
    name: create release
    needs: [build, prepare-release]
    runs-on: ubuntu-latest
    steps:
      # Download all artifacts matching the pattern and merge them into one directory
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries
          merge-multiple: true

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          files: binaries/*
          generate_release_notes: true
